<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Reader</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

:root{
  --bg:#111318;
  --card:#1c1f2a;
  --border:#2a2d3a;
  --accent:#7b9fd4;
  --gold:#c8a84a;
  --text:#ddd8ce;
  --muted:#6b6f84;
  --danger:#c8824a;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ── TOP BAR ── */
#topbar{
  display:flex;
  align-items:center;
  gap:6px;
  padding:8px 10px;
  background:var(--card);
  border-bottom:1px solid var(--border);
  width:100%;
}

#url-bar{
  flex:1;
  min-width:0;
  background:var(--bg);
  border:1px solid var(--border);
  color:var(--text);
  padding:7px 12px;
  border-radius:10px;
  font-size:13px;
  font-family:'Inter',sans-serif;
  outline:none;
  width:100%;
}
#url-bar:focus{border-color:var(--accent);}

#go-btn{
  flex-shrink:0;
  background:var(--accent);
  border:none;
  color:#fff;
  padding:7px 14px;
  border-radius:10px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
}

/* ── NAV ROW ── */
#navrow{
  display:flex;
  align-items:center;
  gap:6px;
  padding:6px 10px;
  background:var(--card);
  border-bottom:1px solid var(--border);
  width:100%;
}

.nb{
  background:none;
  border:1px solid var(--border);
  color:var(--muted);
  width:34px;height:34px;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:background .15s,color .15s;
}
.nb:active{background:var(--border);color:var(--text);}

#reader-btn{
  flex:1;
  background:none;
  border:1px solid var(--border);
  color:var(--muted);
  padding:0 14px;
  height:34px;
  border-radius:8px;
  cursor:pointer;
  font-size:12px;
  font-weight:600;
  font-family:'Inter',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all .2s;
}
#reader-btn.on{border-color:var(--gold);color:var(--gold);background:rgba(200,168,74,.1);}

/* ── CONTENT AREA ── */
#content{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  margin-top:calc(44px + 46px); /* topbar + navrow */
  overflow:hidden;
}

#web-view{
  width:100%;height:100%;
  border:none;
  background:#fff;
  display:none;
}

#home-screen{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:10px;
  color:var(--muted);
  font-size:14px;
  text-align:center;
  padding:24px;
}
#home-screen .icon{font-size:40px;opacity:.3;}
#home-screen p{line-height:1.6;opacity:.7;}

/* ── READER PANEL ── */
#reader-view{
  width:100%;height:100%;
  background:var(--bg);
  overflow-y:auto;
  display:none;
  -webkit-overflow-scrolling:touch;
}

#reader-content{
  padding:20px 18px 60px;
  max-width:100%;
}

#r-domain{
  font-size:11px;
  font-weight:600;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:10px;
}

#r-title{
  font-family:'Lora',Georgia,serif;
  font-size:24px;
  font-weight:600;
  line-height:1.25;
  color:var(--text);
  margin-bottom:20px;
}

/* ── AI CARD ── */
#ai-card{
  background:var(--card);
  border:1px solid rgba(123,159,212,.25);
  border-radius:12px;
  padding:14px 16px;
  margin-bottom:16px;
  position:relative;
  overflow:hidden;
}
#ai-card::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),transparent);
}
#ai-card-top{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
#ai-label{
  display:flex;align-items:center;gap:6px;
  font-size:10px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--accent);
}
.dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:blink 1.8s infinite;}
.dot.still{animation:none;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
#sum-btn{
  background:var(--accent);
  border:none;color:#fff;
  padding:5px 12px;
  border-radius:20px;
  font-size:11px;font-weight:600;
  font-family:'Inter',sans-serif;
  cursor:pointer;
  white-space:nowrap;
  flex-shrink:0;
}
#sum-btn:disabled{opacity:.45;cursor:not-allowed;}
#ai-text{
  font-family:'Lora',Georgia,serif;
  font-size:15px;
  line-height:1.65;
  color:#a8b8d0;
  font-style:italic;
  min-height:20px;
}

/* ── TEXT CONTROLS ── */
#txt-controls{
  display:flex;align-items:center;gap:6px;
  margin-bottom:16px;
  padding:10px 12px;
  background:var(--card);
  border-radius:10px;
  flex-wrap:nowrap;
  overflow-x:auto;
  scrollbar-width:none;
}
#txt-controls::-webkit-scrollbar{display:none;}

.tc-label{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.07em;white-space:nowrap;flex-shrink:0;}
.sz-btn{
  background:none;
  border:1px solid var(--border);
  color:var(--muted);
  padding:4px 10px;
  border-radius:6px;
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  font-family:'Inter',sans-serif;
  white-space:nowrap;
  flex-shrink:0;
  transition:all .15s;
}
.sz-btn.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.sz-btn:active{opacity:.7;}

.divider{width:1px;height:18px;background:var(--border);flex-shrink:0;}

/* ── ARTICLE BODY ── */
#r-body{
  font-family:'Lora',Georgia,serif;
  font-size:17px;
  line-height:1.8;
  color:#c4bdb4;
  font-weight:400;
  transition:font-size .2s,line-height .2s;
}
#r-body p{margin-bottom:1.2em;}
#r-body h1,#r-body h2,#r-body h3{
  font-weight:600;color:var(--text);
  margin:1.4em 0 .5em;line-height:1.2;
}
#r-body h2{font-size:1.25em;}
#r-body h3{font-size:1.1em;}
#r-body a{color:var(--accent);text-decoration:none;}
#r-body img{max-width:100%;border-radius:8px;margin:.8em 0;display:block;}
#r-body blockquote{border-left:3px solid var(--gold);padding-left:14px;color:#9a9080;font-style:italic;margin:1.2em 0;}
#r-body ul,#r-body ol{margin-left:1.4em;margin-bottom:1em;}
#r-body li{margin-bottom:.3em;}
#r-body table{width:100%;font-size:13px;border-collapse:collapse;margin-bottom:1em;overflow:hidden;border-radius:6px;}
#r-body td,#r-body th{padding:6px 8px;border:1px solid var(--border);text-align:left;}

/* ── WORD COUNT ── */
#wc{font-size:11px;color:var(--muted);margin-bottom:14px;}

/* ── SPINNER ── */
.spin{display:flex;align-items:center;justify-content:center;padding:40px;}
.spin::after{content:'';width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:rot .7s linear infinite;}
@keyframes rot{to{transform:rotate(360deg);}}

/* ── STATUS ── */
#statusbar{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--card);
  border-top:1px solid var(--border);
  padding:4px 14px;
  font-size:11px;color:var(--muted);
  display:flex;align-items:center;gap:8px;
  z-index:50;
}
#status-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

</style>
</head>
<body>

<!-- TOP BAR: URL -->
<div id="topbar">
  <input id="url-bar" type="url" placeholder="https://en.wikipedia.org/wiki/Meditation"
    onkeydown="if(event.key==='Enter')go()">
  <button id="go-btn" onclick="go()">Go</button>
</div>

<!-- NAV ROW -->
<div id="navrow">
  <button class="nb" onclick="goBack()" title="Back">&#8592;</button>
  <button class="nb" onclick="goFwd()" title="Forward">&#8594;</button>
  <button class="nb" onclick="doReload()" title="Reload">&#8635;</button>
  <button id="reader-btn" onclick="toggleReader()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
      <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
    </svg>
    Reader Mode
  </button>
</div>

<!-- CONTENT -->
<div id="content">

  <!-- HOME -->
  <div id="home-screen">
    <div class="icon">🌐</div>
    <p>Enter a URL and tap <strong>Go</strong><br>Then tap <strong>Reader Mode</strong> for<br>clean reading + AI summary</p>
  </div>

  <!-- WEB IFRAME -->
  <iframe id="web-view" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
    onload="onLoad()"></iframe>

  <!-- READER -->
  <div id="reader-view">
    <div id="reader-content">

      <div id="r-domain"></div>
      <div id="r-title"></div>

      <!-- AI CARD -->
      <div id="ai-card">
        <div id="ai-card-top">
          <div id="ai-label">
            <span class="dot" id="ai-dot"></span>
            AI Summary
          </div>
          <button id="sum-btn" onclick="summarise()">✦ Summarise</button>
        </div>
        <div id="ai-text">Tap Summarise to get an AI overview of this article.</div>
      </div>

      <!-- TEXT CONTROLS -->
      <div id="txt-controls">
        <span class="tc-label">SIZE</span>
        <button class="sz-btn" onclick="setSize(14,this)">XS</button>
        <button class="sz-btn" onclick="setSize(17,this)">S</button>
        <button class="sz-btn on" onclick="setSize(19,this)">M</button>
        <button class="sz-btn" onclick="setSize(22,this)">L</button>
        <button class="sz-btn" onclick="setSize(26,this)">XL</button>
        <div class="divider"></div>
        <span class="tc-label">SPACING</span>
        <button class="sz-btn" onclick="setLH(1.5,this)">Tight</button>
        <button class="sz-btn on" onclick="setLH(1.8,this)">Normal</button>
        <button class="sz-btn" onclick="setLH(2.2,this)">Airy</button>
        <div class="divider"></div>
        <span class="tc-label">FONT</span>
        <button class="sz-btn on" onclick="setFont('serif',this)">Serif</button>
        <button class="sz-btn" onclick="setFont('sans',this)">Sans</button>
      </div>

      <div id="wc"></div>
      <div id="r-body"></div>
    </div>
  </div>

</div>

<!-- STATUS -->
<div id="statusbar">
  <span id="status-text">Ready</span>
</div>

<script>
var url='', hist=[], hi=-1, readerOn=false;
var fsize=19, lh=1.8, font='serif', extracted='';

var TOPBAR_H = document.getElementById('topbar').offsetHeight;
var NAVROW_H  = document.getElementById('navrow').offsetHeight;

function setContentTop(){
  var h = document.getElementById('topbar').offsetHeight + document.getElementById('navrow').offsetHeight;
  document.getElementById('content').style.top = h+'px';
}
setContentTop();
window.addEventListener('resize', setContentTop);

function status(t){ document.getElementById('status-text').textContent = t; }

function go(u){
  u = u || document.getElementById('url-bar').value.trim();
  if(!u) return;
  if(!/^https?:\/\//.test(u)) u='https://'+u;
  document.getElementById('url-bar').value = u;
  url = u;
  hist = hist.slice(0, hi+1);
  hist.push(u); hi = hist.length-1;
  readerOn ? loadReader(u) : loadWeb(u);
}

function loadWeb(u){
  document.getElementById('home-screen').style.display='none';
  document.getElementById('reader-view').style.display='none';
  var f=document.getElementById('web-view');
  f.style.display='block';
  f.src=u;
  status('Loading…');
}

function onLoad(){ status(url); }
function goBack(){ if(hi>0){hi--;go(hist[hi]);} }
function goFwd(){ if(hi<hist.length-1){hi++;go(hist[hi]);} }
function doReload(){ if(url) go(url); }

/* READER TOGGLE */
function toggleReader(){
  readerOn=!readerOn;
  var btn=document.getElementById('reader-btn');
  if(readerOn){
    btn.classList.add('on');
    btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> Exit Reader';
    document.getElementById('web-view').style.display='none';
    document.getElementById('home-screen').style.display='none';
    document.getElementById('reader-view').style.display='block';
    if(url) loadReader(url); else document.getElementById('r-title').textContent='Enter a URL above';
  } else {
    btn.classList.remove('on');
    btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> Reader Mode';
    document.getElementById('reader-view').style.display='none';
    if(url){ document.getElementById('web-view').style.display='block'; }
    else { document.getElementById('home-screen').style.display='flex'; }
    resetSum();
  }
}

/* LOAD READER */
async function loadReader(u){
  status('Fetching article…');
  document.getElementById('r-title').textContent='';
  document.getElementById('r-domain').textContent='';
  document.getElementById('r-body').innerHTML='<div class="spin"></div>';
  document.getElementById('wc').textContent='';
  resetSum();
  try{
    var r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(u));
    var d=await r.json();
    if(!d.contents) throw new Error('blocked');
    render(parse(d.contents,u),u);
  } catch(e){
    document.getElementById('r-title').textContent='Could not load article';
    document.getElementById('r-body').innerHTML='<p style="color:var(--muted)">This page blocked access. Try a Wikipedia or blog URL.<br><br>Example:<br><em>en.wikipedia.org/wiki/Meditation</em></p>';
    status('Failed — try another URL');
  }
}

function parse(html,u){
  var doc=new DOMParser().parseFromString(html,'text/html');
  var title=(doc.querySelector('h1')||doc.querySelector('title')||{textContent:'Untitled'}).textContent.trim();
  var domain=''; try{domain=new URL(u).hostname.replace('www.','');}catch(e){}
  ['script','style','nav','footer','header','aside','form',
   '.nav','.footer','.sidebar','.menu','.ad','#nav','#footer','#header','#sidebar',
   '.navbox','table.navbox','.mw-editsection','.reference','.reflist','.toc',
   '.mw-jump-link','#mw-navigation'].forEach(function(s){
    doc.querySelectorAll(s).forEach(function(el){el.remove();});
  });
  var content=doc.querySelector('article')||doc.querySelector('[role="main"]')||doc.querySelector('main')||doc.querySelector('.post-content')||doc.querySelector('.entry-content')||doc.querySelector('#mw-content-text')||doc.body;
  content.querySelectorAll('img').forEach(function(img){
    var src=img.getAttribute('src')||'';
    if(src.startsWith('//')) img.src='https:'+src;
    else if(src.startsWith('/')) try{img.src=new URL(u).origin+src;}catch(e){}
  });
  content.querySelectorAll('a').forEach(function(a){
    var h=a.getAttribute('href')||'';
    if(h.startsWith('/')) try{a.href=new URL(u).origin+h;}catch(e){}
    a.target='_blank'; a.rel='noopener';
  });
  return{title:title,domain:domain,html:content.innerHTML,text:content.textContent.replace(/\s+/g,' ').trim()};
}

function render(p,u){
  document.getElementById('r-domain').textContent=p.domain;
  document.getElementById('r-title').textContent=p.title;
  document.getElementById('r-body').innerHTML=p.html;
  var words=p.text.split(/\s+/).filter(Boolean).length;
  document.getElementById('wc').textContent=words.toLocaleString()+' words · '+Math.ceil(words/220)+' min read';
  extracted=p.text.slice(0,8000);
  status('Reader — '+p.domain);
  applyStyle();
}

/* AI SUMMARISE */
async function summarise(){
  if(!extracted){document.getElementById('ai-text').textContent='No article loaded.';return;}
  var btn=document.getElementById('sum-btn'),dot=document.getElementById('ai-dot'),el=document.getElementById('ai-text');
  btn.disabled=true; btn.textContent='…'; dot.classList.remove('still'); el.textContent='';
  var i=0,t=setInterval(function(){el.textContent='Thinking'+'.'.repeat(++i%4);},400);
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',max_tokens:600,
        system:'Summarise in 3-4 sentences. Main thesis, key facts, conclusion. Plain English. No bullets. Start directly.',
        messages:[{role:'user',content:'Summarise:\n\n'+extracted}]
      })
    });
    clearInterval(t);
    var data=await res.json();
    if(data.error) throw new Error(data.error.message);
    var s=data.content&&data.content[0]&&data.content[0].text||'No summary.';
    el.textContent=''; var j=0;
    var iv=setInterval(function(){el.textContent+=s[j++];if(j>=s.length)clearInterval(iv);},14);
    dot.classList.add('still'); btn.textContent='↺'; btn.disabled=false;
  } catch(e){
    clearInterval(t); el.textContent='Error: '+e.message;
    dot.classList.add('still'); btn.textContent='Retry'; btn.disabled=false;
  }
}

function resetSum(){
  document.getElementById('ai-text').textContent='Tap Summarise to get an AI overview of this article.';
  document.getElementById('sum-btn').textContent='✦ Summarise'; document.getElementById('sum-btn').disabled=false;
  document.getElementById('ai-dot').classList.remove('still');
}

/* TEXT CONTROLS */
function setSize(v,btn){
  fsize=v;
  document.querySelectorAll('#txt-controls .sz-btn').forEach(function(b){
    if(['XS','S','M','L','XL'].indexOf(b.textContent)>=0) b.classList.remove('on');
  });
  btn.classList.add('on');
  applyStyle();
}
function setLH(v,btn){
  lh=v;
  ['Tight','Normal','Airy'].forEach(function(t){
    document.querySelectorAll('#txt-controls .sz-btn').forEach(function(b){if(b.textContent===t)b.classList.remove('on');});
  });
  btn.classList.add('on');
  applyStyle();
}
function setFont(v,btn){
  font=v;
  ['Serif','Sans'].forEach(function(t){
    document.querySelectorAll('#txt-controls .sz-btn').forEach(function(b){if(b.textContent===t)b.classList.remove('on');});
  });
  btn.classList.add('on');
  applyStyle();
}
function applyStyle(){
  var b=document.getElementById('r-body');
  b.style.fontSize=fsize+'px';
  b.style.lineHeight=lh;
  b.style.fontFamily=font==='sans'?"'Inter',sans-serif":"'Lora',Georgia,serif";
}
</script>
</body>
</html>
